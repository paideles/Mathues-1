<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matheus e Responsabilidade</title>

<style>
:root{
    --bg:#f1f5f9;
    --card:#ffffff;
    --text:#0f172a;
    --primary:#3b82f6;
    --border:#e2e8f0;
}

.dark{
    --bg:#020617;
    --card:#0f172a;
    --text:#e2e8f0;
    --primary:#22c55e;
    --border:#1e293b;
}

body{
    margin:0;
    font-family: 'Segoe UI', Arial;
    background:var(--bg);
    color:var(--text);
    transition:0.3s;
}

/* HEADER */
header{
    position:fixed;
    top:0;
    width:100%;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.7);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    border-bottom:1px solid var(--border);
    z-index:10;
}

.dark header{
    background:rgba(2,6,23,0.7);
}

h2{
    margin:0;
    font-size:18px;
}

/* BOTÕES */
button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    background:var(--primary);
    color:#fff;
    cursor:pointer;
    margin-left:5px;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
    opacity:0.9;
}

/* CONTAINER */
.container{
    margin-top:70px;
    padding:10px;
    height:75vh;
    overflow:auto;
}

/* CARD */
.table-box{
    background:var(--card);
    border-radius:12px;
    padding:10px;
    box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

/* TABELA */
table{
    border-collapse:collapse;
    width:max-content;
    min-width:100%;
}

td, th{
    border:1px solid var(--border);
    width:110px;
    height:45px;
    text-align:center;
    transition:0.2s;
}

th{
    background:var(--bg);
    position:sticky;
    top:0;
    z-index:5;
}

/* INPUT */
input{
    width:100%;
    height:100%;
    border:none;
    background:transparent;
    color:var(--text);
    text-align:center;
    font-size:14px;
    outline:none;
}

/* HOVER */
td:hover{
    background:rgba(59,130,246,0.08);
}

/* TOTAIS */
.totalLinha{
    font-weight:bold;
    color:#22c55e;
    background:rgba(34,197,94,0.1);
}

.totalGeral{
    position:fixed;
    bottom:0;
    width:100%;
    background:var(--card);
    border-top:1px solid var(--border);
    font-size:18px;
    padding:12px;
    text-align:center;
    font-weight:bold;
    box-shadow:0 -4px 10px rgba(0,0,0,0.05);
}

/* SCROLL BONITO */
::-webkit-scrollbar{
    height:8px;
}
::-webkit-scrollbar-thumb{
    background:var(--primary);
    border-radius:10px;
}
</style>

</head>
<body>

<header>
<h2>Matheus e Responsabilidade</h2>
<div>
<button onclick="toggleTema()">🌙</button>
<button onclick="limparTudo()">🗑️</button>
</div>
</header>

<div class="container">
<div class="table-box">
<table id="planilha"></table>
</div>
</div>

<div class="totalGeral">
TOTAL GERAL: R$ <span id="totalGeral">0.00</span>
</div>

<script>
const linhas = 20;
const colunas = 10;
const tabela = document.getElementById("planilha");

// CABEÇALHO
let header1 = "<tr><th></th>";
for(let c=0;c<colunas;c++){
    header1 += `<th>${String.fromCharCode(65+c)}</th>`;
}
header1 += "<th>Total</th></tr>";

let header2 = "<tr><th></th>";
for(let c=0;c<colunas;c++){
    header2 += (c===0) ? "<th>Produto</th>" : "<th>Valor</th>";
}
header2 += "<th>Total</th></tr>";

tabela.innerHTML += header1 + header2;

// LINHAS
for(let i=1;i<=linhas;i++){
    let row = `<tr><th>${i}</th>`;
    for(let j=0;j<colunas;j++){
        let id = String.fromCharCode(65+j)+i;
        row += `<td><input id="${id}" oninput="salvar('${id}')"></td>`;
    }
    row += `<td class="totalLinha" id="T${i}">0.00</td></tr>`;
    tabela.innerHTML += row;
}

// DADOS
function getDados(){
    return JSON.parse(localStorage.getItem("planilha") || "{}");
}

// LOAD
window.onload = function(){
    let dados = getDados();

    for(let key in dados){
        let el = document.getElementById(key);
        if(el){
            el.value = dados[key];
        }
    }

    calcularTudo();
}

// SALVAR
function salvar(id){
    let dados = getDados();
    dados[id] = document.getElementById(id).value;

    localStorage.setItem("planilha", JSON.stringify(dados));
    calcularTudo();
}

// CALCULAR
function calcularTudo(){
    let dados = getDados();
    let totalGeral = 0;

    for(let i=1;i<=linhas;i++){
        let soma = 0;

        for(let j=1;j<colunas;j++){
            let id = String.fromCharCode(65+j)+i;
            let val = parseFloat(dados[id]) || 0;
            soma += val;
        }

        document.getElementById("T"+i).innerText = soma.toFixed(2);
        totalGeral += soma;
    }

    document.getElementById("totalGeral").innerText = totalGeral.toFixed(2);
}

// LIMPAR
function limparTudo(){
    if(confirm("Apagar tudo?")){
        localStorage.removeItem("planilha");
        location.reload();
    }
}

// TEMA
function toggleTema(){
    document.body.classList.toggle("dark");

    if(document.body.classList.contains("dark")){
        localStorage.setItem("tema","dark");
    }else{
        localStorage.setItem("tema","light");
    }
}

// CARREGAR TEMA
(function(){
    let tema = localStorage.getItem("tema");
    if(tema === "dark"){
        document.body.classList.add("dark");
    }
})();
</script>

</body>
</html>
